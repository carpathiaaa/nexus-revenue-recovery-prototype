services:
  - type: web
    name: nexus-revenue-recovery
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/config
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Agent reasoning. Set OPENAI_API_KEY in the Render dashboard (do NOT commit it).
      # With no key, the app falls back to its built-in scripted responses.
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_API_KEY
        sync: false
      # Email. Leave disabled to simulate sends; set true + Gmail creds to send for real.
      - key: EMAIL_ENABLED
        value: "false"
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: FOLLOWUP_MAX_TOUCHES
        value: "4"
      - key: CALL_TURN_DELAY_MS
        value: "3500"
      # Voice. Set ELEVENLABS_API in the Render dashboard (do NOT commit it). With
      # no key, calls fall back to the browser's robotic speechSynthesis voices.
      - key: ELEVENLABS_API
        sync: false
      - key: ELEVENLABS_MODEL
        value: eleven_turbo_v2_5
      - key: ELEVENLABS_VOICE_AGENT
        value: cjVigY5qzO86Huf0OWal
      - key: ELEVENLABS_VOICE_CUSTOMER
        value: cgSgspJ2msm6clMCkdW9
